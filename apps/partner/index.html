<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <meta name="theme-color" content="#fffbf8" />
    <meta name="robots" content="noindex, nofollow" />
    <title>sonoQui — Partner</title>
    <style>
      @keyframes sq-spin { to { transform: rotate(360deg); } }
      #root .sq-boot {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #fffbf8;
      }
      .sq-boot-ring {
        width: 36px; height: 36px; border-radius: 999px;
        border: 3px solid rgba(21,86,158,0.2); border-top-color: #15569e;
        animation: sq-spin 0.8s linear infinite;
      }
      @media (prefers-reduced-motion: reduce) { .sq-boot-ring { animation: none; } }
    </style>
  </head>
  <body class="bg-neutral-50 text-neutral-900 antialiased">
    <div id="root">
      <div class="sq-boot" aria-busy="true" aria-label="Caricamento"><div class="sq-boot-ring"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
