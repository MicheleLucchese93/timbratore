server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Instant server-side redirect for the bare root so visitors never see
    # Astro's "Redirecting from / to /it/" HTML flash.
    location = / {
        return 301 /it/;
    }
    location = /index.html {
        return 301 /it/;
    }

    # Long cache for hashed Astro assets.
    location /_astro/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static multi-page site: serve file, then dir index, else 404.
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Lightweight liveness probe used by docker HEALTHCHECK upstream.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # Security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1024;
}
