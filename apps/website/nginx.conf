server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version on error pages / response headers.
    server_tokens off;

    # Emit relative Location headers (e.g. "/it/") instead of absolute ones.
    # TLS is terminated at Caddy; the internal hop to this container is plain
    # http, so nginx would otherwise expand "return 301 /it/" using $scheme=http
    # and send "Location: http://sonoqui.pro/it/" — forcing Cloudflare to
    # 308-upgrade it to https (a redundant 2nd hop). A relative Location lets
    # the browser resolve against the current scheme+host (https, and the
    # correct vhost — this container also serves partners.sonoqui.pro).
    absolute_redirect off;

    # Branded static 404 (Astro emits /404.html on build).
    error_page 404 /404.html;

    # Instant server-side redirect for the bare root so visitors never see
    # Astro's "Redirecting from / to /it/" HTML flash.
    location = / {
        return 301 /it/;
    }
    location = /index.html {
        return 301 /it/;
    }

    # Long cache for hashed Astro assets.
    location /_astro/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static multi-page site: serve file, then dir index, else 404.
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Lightweight liveness probe used by docker HEALTHCHECK upstream.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # Security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1024;
}
