<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reimposta password — sonoQui</title>
<style>
  :root {
    --primary: #b25500;
    --on-primary: #fff;
    --surface: #fffbf8;
    --on-surface: #1f1b16;
    --on-surface-variant: #514440;
    --outline: #847872;
    --success: #1e7a3a;
    --success-bg: #e8f3ec;
    --error: #ba1a1a;
    --error-bg: #fde4e4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--surface);
    color: var(--on-surface);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    max-width: 420px;
    width: 100%;
    padding: 2rem;
  }
  .brand { font-size: 2rem; font-weight: 800; color: var(--primary); text-align: center; margin-bottom: 0.25rem; }
  .tagline { text-align: center; color: var(--on-surface-variant); font-size: 0.85rem; margin-bottom: 1.5rem; }
  h1 { font-size: 1.25rem; margin: 0 0 0.25rem; }
  .hint { color: var(--on-surface-variant); font-size: 0.85rem; margin-bottom: 1rem; }
  label { display: block; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--on-surface-variant); margin: 0.75rem 0 0.25rem; }
  input[type="password"] {
    width: 100%;
    padding: 0.625rem 0.75rem;
    border: 1px solid var(--outline);
    border-radius: 8px;
    font-size: 0.95rem;
    outline: none;
    color: var(--on-surface);
  }
  input[type="password"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(178,85,0,0.18); }
  button {
    width: 100%;
    margin-top: 1rem;
    padding: 0.75rem;
    background: var(--primary);
    color: var(--on-primary);
    border: 0;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .alert { margin-top: 1rem; padding: 0.75rem; border-radius: 8px; font-size: 0.85rem; }
  .alert-err { background: var(--error-bg); color: var(--error); }
  .alert-ok { background: var(--success-bg); color: var(--success); }
  .hidden { display: none; }
  .rules { color: var(--on-surface-variant); font-size: 0.75rem; margin-top: 0.25rem; }
  .center { text-align: center; }
  a { color: var(--primary); text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">sonoQui</div>
    <p class="tagline">Una timbratura semplice. Per chi c'è.</p>

    <h1>Imposta la tua password</h1>
    <p class="hint">Crea una password per accedere al tuo account.</p>

    <form id="form">
      <label for="p1">Nuova password</label>
      <input id="p1" type="password" autocomplete="new-password" required minlength="8">
      <div class="rules">Almeno 8 caratteri.</div>

      <label for="p2">Conferma password</label>
      <input id="p2" type="password" autocomplete="new-password" required minlength="8">

      <button id="submit" type="submit">Salva password</button>
    </form>

    <div id="ok" class="alert alert-ok hidden">
      Password aggiornata. <a href="https://app-sonoqui.xdevapp.it/">Accedi</a>.
    </div>
    <div id="err" class="alert alert-err hidden"></div>
  </div>

<script>
(function () {
  function $(id) { return document.getElementById(id); }
  function showErr(msg) { var e = $('err'); e.textContent = msg; e.classList.remove('hidden'); }
  function clearErr() { $('err').classList.add('hidden'); }

  var GOTRUE_URL = 'https://auth-sonoqui.xdevapp.it';

  // Two ways the user can land here:
  //  1. Direct recovery/invite link: ?token_hash=...&type=recovery — we hold the
  //     single-use OTP and exchange it for a session ON SUBMIT (see below). Never
  //     on load, so corporate mail scanners / SafeLinks that merely GET the page
  //     can't burn the token before the human sets their password.
  //  2. Legacy hash flow: #access_token=... already minted by a prior /verify
  //     (e.g. the invite bounce from confirm-email.html).
  var query = new URL(window.location.href).searchParams;
  var hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
  var tokenHash = query.get('token_hash');
  var type = query.get('type') || 'recovery';
  var accessToken = hash.get('access_token');
  var errCode = hash.get('error_code') || hash.get('error');

  if (errCode) {
    var desc = hash.get('error_description') || 'Link non valido o scaduto.';
    showErr(decodeURIComponent(desc.replace(/\+/g, ' ')));
    $('submit').disabled = true;
  } else if (!accessToken && !tokenHash) {
    showErr('Link non valido o scaduto. Richiedi un nuovo invito o reset.');
    $('submit').disabled = true;
  }

  // Exchange the OTP token_hash for a session. GoTrue marks the token used here,
  // so this runs only at submit time — after the user has filled the form.
  async function exchangeTokenHash() {
    var r = await fetch(GOTRUE_URL + '/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: type, token_hash: tokenHash }),
    });
    var j = await r.json().catch(function () { return {}; });
    if (!j.access_token) {
      throw new Error(j.error_description || j.msg || 'Link non valido o scaduto.');
    }
    return j.access_token;
  }

  $('form').addEventListener('submit', async function (ev) {
    ev.preventDefault();
    clearErr();
    var p1 = $('p1').value;
    var p2 = $('p2').value;
    if (p1.length < 8) return showErr('Almeno 8 caratteri.');
    if (p1 !== p2) return showErr('Le password non coincidono.');
    $('submit').disabled = true;
    try {
      var token = accessToken;
      if (!token && tokenHash) token = await exchangeTokenHash();
      var r = await fetch('/api/v1/auth/update-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ access_token: token, password: p1 }),
      });
      var j = await r.json().catch(function () { return {}; });
      if (!r.ok) throw new Error((j.error && j.error.message) || 'Aggiornamento fallito.');
      $('form').classList.add('hidden');
      $('ok').classList.remove('hidden');
    } catch (e) {
      showErr(e.message || 'Errore.');
      $('submit').disabled = false;
    }
  });
})();
</script>
</body>
</html>
