services:
  sonoqui-api:
    build: .
    container_name: sonoqui-api
    restart: unless-stopped
    env_file:
      - apps/backend/.env.production
    environment:
      - PORT=4000
      - NODE_ENV=production
      - CENTRIFUGO_PROXY_SECRET=${CENTRIFUGO_SONOQUI_API_KEY}
      # Pin issuer — gotrue-sonoqui mints with this exact value below.
      - GOTRUE_JWT_ISSUER=https://auth-sonoqui.xdevapp.it
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Persistent disk for generated export files (XLSX/JSON). Mount point is
    # created node:node in the image so the empty volume is writable by the
    # unprivileged runtime user. STORAGE_DISK_PATH=/data is baked in the image.
    volumes:
      - sonoqui_export_data:/data
    networks:
      - default
      - gateway
      - infra_internal

  gotrue-sonoqui:
    image: supabase/auth:v2.188.1
    container_name: gotrue-sonoqui
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      GOTRUE_DB_DRIVER: "postgres"
      # gotrue_superadmin role owns the `auth` schema in sonoqui DB (pg-init).
      GOTRUE_DB_DATABASE_URL: "postgres://gotrue_superadmin:${GOTRUE_PG_PASS}@postgres:5432/sonoqui?sslmode=disable"
      GOTRUE_SITE_URL: "https://api-sonoqui.xdevapp.it"
      GOTRUE_URI_ALLOW_LIST: "sonoqui://auth-callback,sonoqui://*,https://api-sonoqui.xdevapp.it/**,https://app-sonoqui.xdevapp.it/**"
      GOTRUE_JWT_SECRET: "${SONOQUI_JWT_SECRET}"
      GOTRUE_JWT_ISSUER: "https://auth-sonoqui.xdevapp.it"
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_MAILER_OTP_EXP: "86400"
      GOTRUE_MAILER_SUBJECTS_CONFIRMATION: '{{ if eq (.Data.language) "it" }}Conferma la registrazione su sonoQui{{ else }}Confirm your sonoQui signup{{ end }}'
      GOTRUE_MAILER_SUBJECTS_RECOVERY: '{{ if eq (.Data.language) "it" }}Reimposta la password sonoQui{{ else }}Reset your sonoQui password{{ end }}'
      GOTRUE_MAILER_SUBJECTS_INVITE: '{{ if eq (.Data.language) "it" }}Sei stato invitato a sonoQui{{ else }}You''ve been invited to sonoQui{{ end }}'
      GOTRUE_MAILER_TEMPLATES_CONFIRMATION: "http://sonoqui-api:4000/templates/confirmation.html"
      GOTRUE_MAILER_TEMPLATES_RECOVERY: "http://sonoqui-api:4000/templates/recovery.html"
      GOTRUE_MAILER_TEMPLATES_INVITE: "http://sonoqui-api:4000/templates/invite.html"
      GOTRUE_MAILER_URLPATHS_INVITE: "/verify"
      GOTRUE_SMTP_HOST: "${SMTP_HOST}"
      GOTRUE_SMTP_PORT: "${SMTP_PORT}"
      GOTRUE_SMTP_USER: "${SMTP_USER}"
      GOTRUE_SMTP_PASS: "${SMTP_PASS}"
      GOTRUE_SMTP_ADMIN_EMAIL: "noreply@xdevapp.it"
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: "/verify"
      GOTRUE_MAILER_URLPATHS_RECOVERY: "/verify"
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "${SONOQUI_GOOGLE_ENABLED:-false}"
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: "${SONOQUI_GOOGLE_CLIENT_ID:-}"
      GOTRUE_EXTERNAL_GOOGLE_SECRET: "${SONOQUI_GOOGLE_SECRET:-}"
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: "https://auth-sonoqui.xdevapp.it/callback"
      GOTRUE_EXTERNAL_APPLE_ENABLED: "${SONOQUI_APPLE_ENABLED:-false}"
      # 1st = Service ID (web OAuth client_id), 2nd = iOS Bundle ID (native id-token aud).
      GOTRUE_EXTERNAL_APPLE_CLIENT_ID: "${SONOQUI_APPLE_CLIENT_ID:-app.cisono.cisono.auth,app.cisono.cisono}"
      GOTRUE_EXTERNAL_APPLE_SECRET: "${SONOQUI_APPLE_SECRET:-}"
      GOTRUE_EXTERNAL_APPLE_REDIRECT_URI: "https://auth-sonoqui.xdevapp.it/callback"
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_RATE_LIMIT_HEADER: "CF-Connecting-IP"
      API_EXTERNAL_URL: "https://auth-sonoqui.xdevapp.it"
    volumes:
      - ./gotrue-templates:/templates:ro
    networks:
      - infra_internal
      - gateway
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'

  centrifugo-sonoqui:
    image: centrifugo/centrifugo:v6
    container_name: centrifugo-sonoqui
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        sed
        -e "s|__HMAC_SECRET__|$$CENTRIFUGO_HMAC_SECRET|g"
        -e "s|__API_KEY__|$$CENTRIFUGO_API_KEY|g"
        -e "s|__PG_DSN__|$$CENTRIFUGO_PG_DSN|g"
        /centrifugo/config.template.json > /tmp/config.json &&
        centrifugo --config=/tmp/config.json
    environment:
      CENTRIFUGO_HMAC_SECRET: "${CENTRIFUGO_SONOQUI_HMAC_SECRET}"
      CENTRIFUGO_API_KEY: "${CENTRIFUGO_SONOQUI_API_KEY}"
      CENTRIFUGO_PG_DSN: "postgresql://app:${APP_PG_PASS}@postgres:5432/sonoqui"
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.template.json:ro
    networks:
      - infra_internal
      - gateway
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'

  sonoqui-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: "https://api-sonoqui.xdevapp.it"
        VITE_AUTH_URL: "https://auth-sonoqui.xdevapp.it"
        VITE_CENTRIFUGO_URL: "wss://ws-sonoqui.xdevapp.it/connection/websocket"
        VITE_GOOGLE_MAPS_API_KEY: "${VITE_GOOGLE_MAPS_API_KEY:-}"
    container_name: sonoqui-web
    restart: unless-stopped
    networks:
      - gateway
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'

  sonoqui-mobile-web:
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile
    container_name: sonoqui-mobile-web
    restart: unless-stopped
    networks:
      - gateway
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'

  sonoqui-website:
    build:
      context: .
      dockerfile: apps/website/Dockerfile
    container_name: sonoqui-website
    restart: unless-stopped
    networks:
      - gateway
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'

volumes:
  sonoqui_export_data:

networks:
  gateway:
    external: true
  infra_internal:
    external: true
