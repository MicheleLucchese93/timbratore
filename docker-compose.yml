services:
  sonoqui-api:
    build: .
    container_name: sonoqui-api
    restart: unless-stopped
    env_file:
      - apps/backend/.env.production
    environment:
      - PORT=4000
      - NODE_ENV=production
      - CENTRIFUGO_PROXY_SECRET=${CENTRIFUGO_SONOQUI_API_KEY}
      # Pin issuer — gotrue-sonoqui mints with this exact value below.
      - GOTRUE_JWT_ISSUER=https://auth-sonoqui.xdevapp.it
      # Browser CORS allow-list. Pinned here (overrides any CORS_ORIGINS in the
      # env_file) so it is version-controlled alongside the GoTrue and centrifugo
      # allow-lists. sonoqui.pro cutover (2026-06-22) is ADDITIVE: the xdevapp
      # origin stays for the old web build; the .pro entries are the same-origin
      # app (app.sonoqui.pro) and the marketing site (sonoqui.pro). The same-
      # origin web build sends Origin: https://app.sonoqui.pro on every mutating
      # request, so the API must allow it or POST/PUT/DELETE fail CORS_NOT_ALLOWED.
      # partners.sonoqui.pro is the reseller/tenant-management SPA (same-origin
      # build, like app.sonoqui.pro) — its mutating XHRs send Origin:
      # https://partners.sonoqui.pro, so the API must allow it.
      # api.sonoqui.pro is the backend's own domain (= GOTRUE_SITE_URL): the static
      # auth pages (confirm-email.html / reset-password.html) are served from there
      # and POST same-origin to /api/v1/auth/* with Origin: https://api.sonoqui.pro,
      # so it must be allowed or invite/recovery set-password fails CORS_NOT_ALLOWED.
      # (BACKEND_URL still points at the xdevapp host and is used elsewhere —
      # documents.ts raw URLs — so it can't double as this origin.)
      # localhost:5173/8082/5175 = the e2e mutating tier (web/mobile/partner dev
      # SPAs run locally against this prod backend). NODE_ENV=production disables
      # the localhost auto-allow regex in app.ts, so they must be listed
      # explicitly here (they were in .env.production but the pin above shadows it).
      - CORS_ORIGINS=https://app-sonoqui.xdevapp.it,https://app.sonoqui.pro,https://sonoqui.pro,https://partners.sonoqui.pro,https://api.sonoqui.pro,http://localhost:5173,http://localhost:8082,http://localhost:5175
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Persistent disk for generated export files (XLSX/JSON). Mount point is
    # created node:node in the image so the empty volume is writable by the
    # unprivileged runtime user. STORAGE_DISK_PATH=/data is baked in the image.
    volumes:
      - sonoqui_export_data:/data
    networks:
      - default
      - gateway
      - infra_internal

  gotrue-sonoqui:
    image: supabase/auth:v2.188.1
    container_name: gotrue-sonoqui
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      GOTRUE_DB_DRIVER: "postgres"
      # gotrue_superadmin role owns the `auth` schema in sonoqui DB (pg-init).
      GOTRUE_DB_DATABASE_URL: "postgres://gotrue_superadmin:${GOTRUE_PG_PASS}@postgres:5432/sonoqui?sslmode=disable"
      # sonoqui.pro cutover: SiteURL is the base for email links
      # ({{ .SiteURL }}/reset-password.html, /confirm-email.html). api.sonoqui.pro
      # serves the same backend (health/reset-password.html/templates/api verified
      # live), so recovery/invite/confirmation mails now link to the .pro host.
      # JWT issuer + API_EXTERNAL_URL stay on auth-sonoqui.xdevapp.it (token
      # validation is pinned to that issuer — do NOT change here).
      GOTRUE_SITE_URL: "https://api.sonoqui.pro"
      # sonoqui.pro cutover (2026-06-22): the .pro entries are ADDITIVE — the
      # xdevapp hosts stay so already-installed mobile builds and the old web
      # origin keep working. app.sonoqui.pro is the same-origin web app.
      GOTRUE_URI_ALLOW_LIST: "sonoqui://auth-callback,sonoqui://*,https://api-sonoqui.xdevapp.it/**,https://app-sonoqui.xdevapp.it/**,https://app.sonoqui.pro/**,https://sonoqui.pro/**,https://api.sonoqui.pro/**,https://partners.sonoqui.pro/**"
      GOTRUE_JWT_SECRET: "${SONOQUI_JWT_SECRET}"
      GOTRUE_JWT_ISSUER: "https://auth-sonoqui.xdevapp.it"
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_MAILER_OTP_EXP: "86400"
      GOTRUE_MAILER_SUBJECTS_CONFIRMATION: '{{ if eq (.Data.language) "it" }}Conferma la registrazione su sonoQui{{ else }}Confirm your sonoQui signup{{ end }}'
      GOTRUE_MAILER_SUBJECTS_RECOVERY: '{{ if eq (.Data.language) "it" }}Reimposta la password sonoQui{{ else }}Reset your sonoQui password{{ end }}'
      GOTRUE_MAILER_SUBJECTS_INVITE: '{{ if eq (.Data.language) "it" }}Sei stato invitato a sonoQui{{ else }}You''ve been invited to sonoQui{{ end }}'
      GOTRUE_MAILER_TEMPLATES_CONFIRMATION: "http://sonoqui-api:4000/templates/confirmation.html"
      GOTRUE_MAILER_TEMPLATES_RECOVERY: "http://sonoqui-api:4000/templates/recovery.html"
      GOTRUE_MAILER_TEMPLATES_INVITE: "http://sonoqui-api:4000/templates/invite.html"
      GOTRUE_MAILER_URLPATHS_INVITE: "/verify"
      GOTRUE_SMTP_HOST: "${SMTP_HOST}"
      GOTRUE_SMTP_PORT: "${SMTP_PORT}"
      GOTRUE_SMTP_USER: "${SMTP_USER}"
      GOTRUE_SMTP_PASS: "${SMTP_PASS}"
      # sonoqui.pro cutover: from-address moves to noreply@sonoqui.pro.
      # REQUIRES the sonoqui.pro domain to be AUTHENTICATED in Brevo first
      # (DKIM/DMARC records are staged in Cloudflare; auth completes once the
      # .pro→Cloudflare NS delegation propagates). Deploy this only after Brevo
      # shows sonoqui.pro = Authenticated, otherwise Brevo rejects the sends.
      GOTRUE_SMTP_ADMIN_EMAIL: "noreply@sonoqui.pro"
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: "/verify"
      GOTRUE_MAILER_URLPATHS_RECOVERY: "/verify"
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "${SONOQUI_GOOGLE_ENABLED:-false}"
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: "${SONOQUI_GOOGLE_CLIENT_ID:-}"
      GOTRUE_EXTERNAL_GOOGLE_SECRET: "${SONOQUI_GOOGLE_SECRET:-}"
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: "https://auth-sonoqui.xdevapp.it/callback"
      GOTRUE_EXTERNAL_APPLE_ENABLED: "${SONOQUI_APPLE_ENABLED:-false}"
      # 1st = Service ID (web OAuth client_id), 2nd = iOS Bundle ID (native id-token aud).
      GOTRUE_EXTERNAL_APPLE_CLIENT_ID: "${SONOQUI_APPLE_CLIENT_ID:-app.cisono.cisono.auth,app.cisono.cisono}"
      GOTRUE_EXTERNAL_APPLE_SECRET: "${SONOQUI_APPLE_SECRET:-}"
      GOTRUE_EXTERNAL_APPLE_REDIRECT_URI: "https://auth-sonoqui.xdevapp.it/callback"
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_RATE_LIMIT_HEADER: "CF-Connecting-IP"
      API_EXTERNAL_URL: "https://auth-sonoqui.xdevapp.it"
    volumes:
      - ./gotrue-templates:/templates:ro
    networks:
      - infra_internal
      - gateway
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'

  centrifugo-sonoqui:
    image: centrifugo/centrifugo:v6
    container_name: centrifugo-sonoqui
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        sed
        -e "s|__HMAC_SECRET__|$$CENTRIFUGO_HMAC_SECRET|g"
        -e "s|__API_KEY__|$$CENTRIFUGO_API_KEY|g"
        -e "s|__PG_DSN__|$$CENTRIFUGO_PG_DSN|g"
        /centrifugo/config.template.json > /tmp/config.json &&
        centrifugo --config=/tmp/config.json
    environment:
      CENTRIFUGO_HMAC_SECRET: "${CENTRIFUGO_SONOQUI_HMAC_SECRET}"
      CENTRIFUGO_API_KEY: "${CENTRIFUGO_SONOQUI_API_KEY}"
      CENTRIFUGO_PG_DSN: "postgresql://app:${APP_PG_PASS}@postgres:5432/sonoqui"
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.template.json:ro
    networks:
      - infra_internal
      - gateway
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'

  sonoqui-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: "https://api-sonoqui.xdevapp.it"
        VITE_AUTH_URL: "https://auth-sonoqui.xdevapp.it"
        VITE_CENTRIFUGO_URL: "wss://ws-sonoqui.xdevapp.it/connection/websocket"
        VITE_GOOGLE_MAPS_API_KEY: "${VITE_GOOGLE_MAPS_API_KEY:-}"
    container_name: sonoqui-web
    restart: unless-stopped
    networks:
      - gateway
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'

  # sonoqui.pro parallel web (app.sonoqui.pro) — SAME-ORIGIN build. The browser
  # talks ONLY to app.sonoqui.pro: the gateway's app.sonoqui.pro vhost path-
  # routes /api → sonoqui-api, /auth → gotrue (prefix stripped), and
  # /connection/websocket → centrifugo. This sidesteps the Cloudflare-Free
  # HTTP/2 coalescing 503 that hits cross-host *.sonoqui.pro browser XHRs under
  # the shared Universal cert (see the penno.pro migration). VITE_API_URL=""
  # makes the API client emit relative /api paths; VITE_AUTH_URL points at the
  # same host's /auth prefix. Served ONLY at app.sonoqui.pro; the existing
  # sonoqui-web (app-sonoqui.xdevapp.it) stays untouched.
  sonoqui-web-pro:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ""
        VITE_AUTH_URL: "https://app.sonoqui.pro/auth"
        VITE_CENTRIFUGO_URL: "wss://app.sonoqui.pro/connection/websocket"
        VITE_GOOGLE_MAPS_API_KEY: "${VITE_GOOGLE_MAPS_API_KEY:-}"
    container_name: sonoqui-web-pro
    restart: unless-stopped
    networks:
      - gateway
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'

  # Reseller / tenant-management SPA (partners.sonoqui.pro). SAME-ORIGIN build,
  # identical pattern to sonoqui-web-pro: the browser talks only to
  # partners.sonoqui.pro and Caddy path-routes /api → sonoqui-api and /auth →
  # gotrue. Served by the SAME backend (sonoqui-api) via /api/v1/partnership/*.
  sonoqui-partner:
    build:
      context: .
      dockerfile: apps/partner/Dockerfile
      args:
        VITE_API_URL: ""
        VITE_AUTH_URL: "https://partners.sonoqui.pro/auth"
    container_name: sonoqui-partner
    restart: unless-stopped
    networks:
      - gateway
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'

  sonoqui-mobile-web:
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile
    container_name: sonoqui-mobile-web
    restart: unless-stopped
    networks:
      - gateway
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'

  sonoqui-website:
    build:
      context: .
      dockerfile: apps/website/Dockerfile
    container_name: sonoqui-website
    restart: unless-stopped
    networks:
      - gateway
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'

  # Self-hosted Expo OTA server (expo-open-ota). Lets us ship JS/TS-only
  # changes to the sonoQui mobile app without a store review. Published to via
  # apps/mobile/scripts/publish-ota.sh (eoas). Reverse-proxied at
  # https://ota.sonoqui.pro by the shared /opt/infra Caddy gateway. STORAGE_MODE
  # local → bundles live in the sonoqui_ota_data volume; signing keys are mounted
  # read-only from ./ota/keys (generated locally, scp'd to the server, NOT in git).
  # EXPO_ACCESS_TOKEN authorises the server to resolve channel → branch against
  # Expo's API for project 729f39a2-… (owner micheel93-2).
  ota-sonoqui:
    image: ghcr.io/axelmarciano/expo-open-ota:v2.3.19
    container_name: ota-sonoqui
    platform: linux/amd64
    restart: unless-stopped
    environment:
      PORT: "3000"
      BASE_URL: "https://ota.sonoqui.pro"
      EXPO_APP_ID: "729f39a2-86a4-4bb6-ae03-21dad1922c34"
      EXPO_ACCESS_TOKEN: "${EXPO_ACCESS_TOKEN}"
      JWT_SECRET: "${OTA_JWT_SECRET}"
      ADMIN_PASSWORD: "${OTA_ADMIN_PASSWORD}"
      USE_DASHBOARD: "true"
      STORAGE_MODE: "local"
      LOCAL_BUCKET_BASE_PATH: "/data/updates"
      CACHE_MODE: "local"
      KEYS_STORAGE_TYPE: "local"
      PUBLIC_LOCAL_EXPO_KEY_PATH: "/data/keys/public-key.pem"
      PRIVATE_LOCAL_EXPO_KEY_PATH: "/data/keys/private-key.pem"
    volumes:
      - sonoqui_ota_data:/data/updates
      - ./ota/keys:/data/keys:ro
    networks:
      - gateway
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

volumes:
  sonoqui_export_data:
  sonoqui_ota_data:

networks:
  gateway:
    external: true
  infra_internal:
    external: true
