<!doctype html>
<html lang="{{ if eq (.Data.language) "it" }}it{{ else }}en{{ end }}">
<head><meta charset="utf-8"><title>{{ if eq (.Data.language) "it" }}Reimposta la password{{ else }}Reset your password{{ end }}</title></head>
<body style="font-family:Helvetica,Arial,sans-serif;max-width:560px;margin:2rem auto;padding:0 1rem;line-height:1.55;color:#1f1b16">
{{ if eq (.Data.language) "it" }}
<h2 style="color:#b25500">Reimposta la password</h2>
<p>Utilizza il link qui sotto per reimpostare la tua password.</p>
<p><a style="display:inline-block;background:#b25500;color:#fff;text-decoration:none;padding:10px 18px;border-radius:8px" href="{{ .SiteURL }}/reset-password.html?token_hash={{ .TokenHash }}&type=recovery&redirect_to={{ .RedirectTo }}">Reimposta la password</a></p>
{{ else }}
<h2 style="color:#b25500">Reset your password</h2>
<p>Use the link below to reset your password.</p>
<p><a style="display:inline-block;background:#b25500;color:#fff;text-decoration:none;padding:10px 18px;border-radius:8px" href="{{ .SiteURL }}/reset-password.html?token_hash={{ .TokenHash }}&type=recovery&redirect_to={{ .RedirectTo }}">Reset password</a></p>
{{ end }}
</body>
</html>
